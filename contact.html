<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mon Site</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; color:#333;}
        header { background:#4CAF50; color:white; padding:20px 0; text-align:center;}
        nav { display:flex; justify-content:center; gap:20px; margin:10px 0;}
        nav a { color:white; text-decoration:none; font-weight:bold;}
        nav a:hover { text-decoration:underline;}
        main { padding:20px; max-width:800px; margin:auto;}
        input, textarea { width:100%; padding:10px; margin:5px 0 15px 0; border-radius:5px; border:1px solid #ccc;}
        button { background:#4CAF50; color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:5px;}
        button:hover { background:#45a049;}
        footer { text-align:center; padding:15px; background:#333; color:white; margin-top:20px;}
    </style>
</head>
<body>
    <header>
        <h1>Contactez-nous</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="about.html">À propos</a>
            <a href="services.html">Services</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Formulaire de contact :</h2>
        <form id="contactForm">
            <input type="text" name="name" placeholder="Votre nom" required>
            <input type="email" name="email" placeholder="Votre email" required>
            <textarea name="message" placeholder="Votre message" rows="5" required></textarea>
            <button type="submit">Envoyer</button>
        </form>
    </main>

    <footer>&copy; 2026 Mon Site</footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e){
            e.preventDefault();
            alert('Merci pour votre message ! Nous vous répondrons bientôt.');
            this.reset();
        });
    </script>
</body>
</html>
